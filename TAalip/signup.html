<!-- =========================================================
     SISTEM ADMINISTRASI PETERNAKAN (LIBAS)
     File: signup.html
     Deskripsi: Halaman antarmuka pendaftaran akun (Registrasi)
     untuk mendaftarkan peternak baru ke dalam sistem.
========================================================= -->
<!DOCTYPE html>
<html lang="id">

<head>
  <!-- Menyiapkan halaman mendukung karakter universal dan tata letak untuk HP / Laptop -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Judul bar atas memori Browser -->
  <title>LIBAS - Pendaftaran Akun</title>

  <!-- Mengintegrasikan huruf 'Poppins' untuk desain tampilan profesional -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Menautkan stylesheet (File CSS) khusus untuk mengelola dekorasi warna formulir daftar ini -->
  <link rel="stylesheet" href="css/signup.css">
</head>

<body>

  <!-- ========================= AREA BACKGROUND ========================== -->
  <!-- Bingkai pembantalan yang menampung efek noise atau tekstur dasar laman web -->
  <div class="background">
    <!-- Overlay membuat bintik-bintik modern semu transparan di atas background polos -->
    <div class="noise-overlay"></div>
  </div>

  <!-- ========================= AREA FORMULIR PENDAFTARAN ========================== -->
  <!-- Kotak pusat yang mengapung di tengah layar untuk mengisi biodata profil -->
  <div class="signup-card">
    
    <!-- Judul Formulir -->
    <h2>Buat Akun Anda</h2>
    <p class="subtitle">Daftarkan diri & kelola kandang bersama LIBAS</p>

    <!-- Formulir Eksekusi (saat tombol ditekan form ini yang beraksi) -->
    <!-- Saat ini disimulasikan agar langsung memuat dashboard sistem (seolah-olah sukses daftar) -->
    <form action="dashboardTAalip.html" method="get">
      
      <!-- 1. Kolom Input Nama Lengkap Asli -->
      <div class="input-group">
        <label for="fullname">Nama Lengkap</label>
        <input type="text" id="fullname" placeholder="Masukkan nama langkap Anda" required>
      </div>

      <!-- 2. Kolom Input Nama Panggilan / Alias Kredensial -->
      <div class="input-group">
        <label for="username">Username Akses</label>
        <input type="text" id="username" placeholder="Buat username unik" required>
      </div>

      <!-- 3. Kolom Input Alamat Surel (Email) -->
      <div class="input-group">
        <label for="email">Alamat Email Aktif</label>
        <input type="email" id="email" placeholder="contoh@peternak.com" required>
      </div>

      <!-- 4. Kolom Input Sandi Rahasia -->
      <div class="input-group">
        <label for="password">Sandi (Password)</label>
        <input type="password" id="password" placeholder="Buat kata sandi yang kuat" required>
      </div>

      <!-- Tombol Penyelesaian Registrasi Data -->
      <button type="submit" class="signup-btn">Daftar Sekarang</button>
    </form>

    <!-- ========================= TAUTAN TAMBAHAN (LINK) ========================== -->
    <!-- Jika ternyata sudah mendaftar atau ingin membatalkan/kembali ke awal -->
    <div class="extra-links">
      <p>Apakah Anda sudah memiliki akun? <a href="login.html" title="Masuk ke Akun Lama">Masuk/Login</a></p>
      <p style="margin-top: 10px;">
        <a href="index.html" style="font-size: 13px; opacity: 0.8;" title="Kembali ke Layar Beranda">← Kembali ke Halaman Utama</a>
      </p>
    </div>
  </div>

</body>

</html>
