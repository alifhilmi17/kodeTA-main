<!-- =========================
     SIGN UP PAGE – Eye Catching
========================= -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIBAS - Sign Up</title>

  <!-- Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- File CSS Eksternal -->
  <link rel="stylesheet" href="css/signup.css">
</head>

<body>

  <!-- Latar belakang gradasi & animasi -->
  <div class="background">
    <div class="noise-overlay"></div>
  </div>

  <!-- Kotak sign up -->
  <div class="signup-card">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to join LIBAS</p>

    <form action="dashboardTAalip.html" method="get">
      <div class="input-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>
      </div>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required>
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="extra-links">
      <p>Already have an account? <a href="login.html">Login</a></p>
      <p style="margin-top: 10px;"><a href="index.html" style="font-size: 13px; opacity: 0.8;">← Back to Home</a></p>
    </div>
  </div>

</body>

</html>
