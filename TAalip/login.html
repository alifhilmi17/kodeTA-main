<!-- =========================================================
     SISTEM ADMINISTRASI PETERNAKAN (LIBAS)
     File: login.html
     Deskripsi: Antarmuka gerbang masuk utama, mengecek dan 
     mengizinkan akses profil sistem lewat mekanisme otentikasi.
========================================================= -->
<!DOCTYPE html>
<html lang="id">

<head>
  <!-- Menyiapkan halaman mendukung karakter universal dan tata letak untuk HP / Laptop -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Judul bar atas memori Browser -->
  <title>LIBAS - Akses Masuk</title>

  <!-- Mengintegrasikan huruf 'Poppins' dari repo pusat Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Menautkan stylesheet (File CSS) khusus untuk mengelola visual grafis area Login -->
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <!-- ========================= EFEK BACKGROUND ANIMASI 3D ========================== -->
  <!-- Gelembung-gelembung abstrak / shape melayang yang berjalan pelan menghiasi background belakang -->
  <div class="shapes-container">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Tekstur kabut / noise ala UI modern -->
  <div class="background">
    <div class="noise-overlay"></div>
  </div>

  <!-- ========================= AREA FORM PANEL LOGIN ========================== -->
  <!-- Pengelompokan seluruh kontainer kotak Login di sumbu tengah. -->
  <div class="login-wrapper">
    <div class="login-card">
      
      <!-- Efek Lampu Sorot (Spotlight) menyoroti kartu saat mouse melewati / mengitari elemen. -->
      <div class="card-spotlight"></div> 

      <!-- Judul dan Arahan Singkat Panel Login -->
      <h2>Selamat Datang Kembali!</h2>
      <p class="subtitle">Mohon isi data akses Anda untuk memasuki portal.</p>

      <!-- Pemicu mekanisme Login, secara palsu/prototipe langsung membanting arah menuju Dasbor saat disubmit -->
      <form action="dashboardTAalip.html" method="get" id="loginForm">
        
        <!-- Field 1: Formulir Isian Nama Identitas -->
        <div class="input-group">
          <label for="username">Username Kredensial</label>
          <input type="text" id="username" placeholder="Masukkan ID atau nama unik Anda" autocomplete="off" required>
        </div>

        <!-- Field 2: Formulir Isian Kata Kunci Rahasia -->
        <div class="input-group">
          <label for="password">Kata Sandi (Password)</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Masukkan kode sandi yang valid" required>
            
            <!-- Tombol Interaktif berbentuk Ikon Mata (untuk mengintip kelalaian ketik password) -->
            <span class="toggle-password" id="togglePassword" title="Tampilkan / Sembunyikan Sandi">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                  fill="#fff" fill-opacity="0.7" />
              </svg>
            </span>
          </div>
        </div>

        <!-- Tombol Aksi Mengeksekusi Percobaan Log-In -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Masuk</span>
          <div class="loader"></div> <!-- Ikon muter loading tersembunyi (Akan dipanggil saat loading berlangsung) -->
        </button>
      </form>

      <!-- Tautan Luar Khusus di Dasar Kartu Login -->
      <div class="extra-links">
        <p>Belum sempat mendaftarkan diri? <a href="signup.html">Daftar Akun Baru</a></p>
        <p style="margin-top: 10px;">
          <a href="index.html" style="font-size: 13px; opacity: 0.8;">← Kembali ke Beranda Utama</a>
        </p>
      </div>
    
    </div> <!-- Penutup Login Card -->
  </div> <!-- Penutup Wrapper Login -->

  <!-- ========================= FITUR EASTER EGG (GABUT PENGANTAR LOADING) ========================== -->
  <!-- Menyisipkan aset gambar anak Ayam yang lari-lari sesaat sebelum berpindah tab memanggil JavaScript -->
  <div id="chicken-overlay">
    <div class="chicken"></div>
  </div>

  <!-- Memanggil Logic JS perihal Efek Spotlight Kaca, Animasi Hover Ayam, dan Toggle Mata Sandi -->
  <script src="js/login-interactive.js"></script>

</body>

</html>
